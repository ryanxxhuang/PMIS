name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      # E2E 護欄:三角色簽核鏈(Playwright,demo 模式跑 demoSeed,不碰 Supabase、無 secret)
      - name: 安裝 Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: E2E(三角色簽核鏈)
        run: npx playwright test
      - name: 失敗時上傳 E2E 報告
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
